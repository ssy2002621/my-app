app = "md-word-web"  # 换成你的应用名

[build]
  # 告诉 Fly.io 使用 Dockerfile 构建
  [build.docker]
    # 不指定 dockerfile 路径，默认使用 ./Dockerfile

[env]
  NODE_ENV = "production"
  PORT = "3000"
  # 你的 Convex URL
  VITE_CONVEX_URL = "https://confident-porpoise-845.convex.cloud"

[services]
  [services.http]
    internal_port = 3000
    force_https = true

  [[services.http.checks]]
    port = 3000
    type = "tcp"
    interval = "15s"
    timeout = "5s"